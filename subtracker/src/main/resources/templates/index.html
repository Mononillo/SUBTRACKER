<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subtracker - Gestiona tus suscripciones</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
  </head>

  <body class="d-flex justify-content-center align-items-center vh-100">
    <div
      class="card p-4 text-center shadow"
      style="max-width: 500px; width: 100%"
    >
      <img
        th:src="@{/images/logoSub.png}"
        alt="Subtracker Logo"
        class="logo-subtracker img-fluid rounded-circle mx-auto d-block"
        width="120"
      />

      <h1 class="mt-4">Subtracker</h1>

      <p class="text-muted mb-4">
        Controla todas tus suscripciones en un solo lugar
      </p>

      <a th:href="@{auth/login}" class="btn btn-primary mb-3">
        <i class="fas fa-sign-in-alt me-2"></i>
        Iniciar Sesión
      </a>

      <a th:href="@{auth/register}" class="btn btn-outline-secondary">
        <i class="fas fa-user-plus me-2"></i>
        Registrarse
      </a>

      <div class="mt-4 small text-muted">
        <i class="fas fa-shield-alt"></i>
        Tus datos están seguros
      </div>
    </div>
  </body>
</html>
