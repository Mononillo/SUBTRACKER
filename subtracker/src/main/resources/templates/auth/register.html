<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subtracker - Crear cuenta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 text-center shadow" style="max-width: 400px; width: 100%">
        <img th:src="@{/images/logoSub.png}"
             alt="Subtracker Logo"
             class="logo-subtracker img-fluid mx-auto d-block"
             width="100" />

        <h2 class="mt-3">Crear cuenta</h2>

        <!-- Mostrar mensaje de error si existe -->
        <div class="alert alert-danger" th:if="${error}" th:text="${error}" role="alert"></div>

        <!-- IMPORTANTE: th:object y th:field para binding con el DTO -->
        <form th:action="@{/auth/register}"
              th:object="${usuario}"
              method="post"
              class="mt-4"
              onsubmit="return validarContraseñas()">

            <!-- Campo NOMBRE (antes username) -->
            <div class="mb-3 text-start">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input type="text"
                       id="nombre"
                       th:field="*{nombre}"
                       class="form-control"
                       placeholder="Ej: Juan Pérez"
                       required />
					   <small class="text-danger" th:if="${#fields.hasErrors('nombre')}"
					                          th:errors="*{nombre}"></small>
            </div>

            <!-- Campo CORREO (antes email) -->
            <div class="mb-3 text-start">
                <label for="correo" class="form-label">Correo electrónico</label>
                <input type="email"
                       id="correo"
                       th:field="*{correo}"
                       class="form-control"
                       placeholder="tucorreo@ejemplo.com"
                       required />
                <small class="text-danger" th:if="${#fields.hasErrors('correo')}"
                       th:errors="*{correo}"></small>
            </div>

            <!-- Campo CONTRASEÑA -->
            <div class="mb-3 text-start">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       class="form-control"
                       placeholder="Mínimo 6 caracteres"
                       required />
                <small class="text-danger" th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}"></small>
            </div>

            <!-- Campo CONFIRMAR CONTRASEÑA (solo frontend) -->
            <div class="mb-3 text-start">
                <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                <input type="password"
                       id="confirmPassword"
                       class="form-control"
                       placeholder="Repite tu contraseña"
                       required />
                <small id="passwordError" class="text-danger" style="display: none;">
                    Las contraseñas no coinciden
                </small>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-user-plus me-2"></i>
                Crear cuenta
            </button>
        </form>

        <p class="mt-3 mb-0">
            ¿Ya tienes una cuenta?
            <a th:href="@{/auth/login}">Inicia sesión aquí</a>
        </p>
    </div>

    <!-- Script para validar contraseñas en el cliente -->
    <script>
        function validarContraseñas() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorElement = document.getElementById('passwordError');

            if (password !== confirmPassword) {
                errorElement.style.display = 'block';
                return false; // Evita el envío del formulario
            }
            return true; // Permite el envío
        }
    </script>
</body>
</html>
