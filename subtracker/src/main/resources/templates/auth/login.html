<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subtracker - Iniciar Sesión</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Tus estilos -->
    <link rel="stylesheet" th:href="@{/css/estilos.css}" />
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 text-center shadow" style="max-width: 400px; width: 100%">
        <!-- Logo -->
        <img th:src="@{/images/logoSub.png}"
             alt="Subtracker Logo"
             class="logo-subtracker img-fluid mx-auto d-block"
             width="100" />

        <h2 class="mt-3">Iniciar Sesión</h2>

        <!-- Mensajes de feedback -->
        <div class="alert alert-danger" th:if="${param.error != null}" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            Usuario o contraseña incorrectos
        </div>
        
        <div class="alert alert-success" th:if="${param.registro != null}" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            ¡Registro exitoso! Ahora puedes iniciar sesión
        </div>

        <div class="alert alert-info" th:if="${param.logout != null}" role="alert">
            <i class="fas fa-info-circle me-2"></i>
            Has cerrado sesión correctamente
        </div>

        <!-- Formulario de login - CORREGIDO -->
        <form th:action="@{/auth/login}" method="post" class="mt-4">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">
                    <i class="fas fa-user me-2"></i>Usuario
                </label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       placeholder="Introduce tu email"
                       required />
                <!-- Nota: Spring Security espera 'username' aunque sea email -->
            </div>

            <div class="mb-3 text-start">
                <label for="password" class="form-label">
                    <i class="fas fa-lock me-2"></i>Contraseña
                </label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Introduce tu contraseña"
                       required />
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-2"></i>
                Iniciar Sesión
            </button>
        </form>

        <!-- Enlaces adicionales -->
        <div class="mt-3">
            <p class="mb-1">
                ¿No tienes una cuenta?
                <a th:href="@{/auth/register}" class="text-decoration-none">
                    Regístrate <i class="fas fa-arrow-right ms-1"></i>
                </a>
            </p>
            <p class="mb-0">
                <a th:href="@{/}" class="text-decoration-none text-muted small">
                    <i class="fas fa-home me-1"></i>Volver al inicio
                </a>
            </p>
        </div>
    </div>

    <!-- Validación simple con JavaScript -->
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (username === '' || password === '') {
                e.preventDefault();
                alert('Por favor, completa todos los campos');
            }
        });

        // Ocultar mensajes de error al empezar a escribir
        document.getElementById('username').addEventListener('input', function() {
            const errorAlert = document.querySelector('.alert-danger');
            if (errorAlert) errorAlert.style.display = 'none';
        });
        
        document.getElementById('password').addEventListener('input', function() {
            const errorAlert = document.querySelector('.alert-danger');
            if (errorAlert) errorAlert.style.display = 'none';
        });
		
		       // Verificar si el login fue exitoso
		       document.addEventListener('DOMContentLoaded', function() {
		           // Si hay un parámetro de éxito en la URL
		           const urlParams = new URLSearchParams(window.location.search);
		           if (urlParams.get('success') === 'true') {
		               // Redirigir a banking auth después de 1 segundo
		               setTimeout(() => {
		                   window.location.href = '/auth/banking-auth';
		               }, 1000);
		           }
		       });
		   
    </script>
</body>
</html>
